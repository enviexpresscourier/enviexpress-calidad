<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENVIQUALITY</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0759a5, #16a6d9);
      color: #17324d;
    }

    .tarjeta {
      width: 100%;
      max-width: 440px;
      padding: 32px 22px;
      border-radius: 24px;
      background: #ffffff;
      text-align: center;
      box-shadow: 0 16px 42px rgba(0, 30, 70, 0.28);
    }

    .marca {
      margin-bottom: 24px;
      color: #0759a5;
      font-size: 26px;
      font-weight: 800;
    }

    .titulo {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.3;
    }

    .descripcion {
      margin: 0 auto 24px;
      max-width: 330px;
      color: #64748b;
      font-size: 15px;
      line-height: 1.5;
    }

    .estrellas {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin: 8px 0 12px;
    }

    .estrella {
      border: none;
      padding: 2px;
      background: transparent;
      color: #d5dce5;
      font-size: 48px;
      line-height: 1;
      cursor: pointer;
      transition: transform 0.15s ease, color 0.15s ease;
    }

    .estrella:active {
      transform: scale(0.9);
    }

    .estrella.activa {
      color: #ffc107;
    }

    .resultado {
      min-height: 24px;
      margin-top: 10px;
      color: #0759a5;
      font-size: 16px;
      font-weight: 700;
    }

    .escala {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
      color: #94a3b8;
      font-size: 12px;
    }

    .pie {
      margin-top: 26px;
      color: #94a3b8;
      font-size: 12px;
    }

    @media (max-width: 390px) {
      .tarjeta {
        padding: 28px 16px;
      }

      .estrella {
        font-size: 42px;
      }

      .titulo {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <main class="tarjeta">
    <div class="marca">🚚 ENVIEXPRESS</div>

    <h1 class="titulo">
      ¿Cómo fue la atención de nuestro motorizado?
    </h1>

    <p class="descripcion">
      Tu opinión nos ayuda a mejorar la calidad de nuestras entregas.
    </p>

    <div class="estrellas">
      <button class="estrella" type="button" data-valor="1">★</button>
      <button class="estrella" type="button" data-valor="2">★</button>
      <button class="estrella" type="button" data-valor="3">★</button>
      <button class="estrella" type="button" data-valor="4">★</button>
      <button class="estrella" type="button" data-valor="5">★</button>
    </div>

    <div id="resultado" class="resultado">
      Selecciona una calificación
    </div>

    <div class="escala">
      <span>Muy mala</span>
      <span>Excelente</span>
    </div>

    <div class="pie">
      Sistema de Calidad ENVIEXPRESS
    </div>
  </main>

  <script>
    const estrellas = document.querySelectorAll('.estrella');
    const resultado = document.getElementById('resultado');

    const textos = {
      1: 'Muy mala',
      2: 'Mala',
      3: 'Regular',
      4: 'Buena',
      5: 'Excelente'
    };

    estrellas.forEach(estrella => {
      estrella.addEventListener('click', () => {
        const valor = Number(estrella.dataset.valor);

        estrellas.forEach(item => {
          const valorItem = Number(item.dataset.valor);
          item.classList.toggle('activa', valorItem <= valor);
        });

        resultado.textContent = textos[valor];
      });
    });
  </script>
</body>
</html>
