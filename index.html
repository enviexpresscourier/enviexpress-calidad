<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENVIEXPRESS | Sistema de Calidad</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 0, 0, 0.18), transparent 35%),
        linear-gradient(145deg, #050505 0%, #111111 55%, #1a0000 100%);
      color: #ffffff;
    }

    .tarjeta {
      width: 100%;
      max-width: 460px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 26px;
      background: #0a0a0a;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.55);
    }

    .cabecera {
      position: relative;
      padding: 28px 22px 24px;
      text-align: center;
      background:
        linear-gradient(135deg, rgba(255, 0, 0, 0.2), transparent 36%),
        linear-gradient(160deg, #090909 0%, #121212 100%);
    }

    .cabecera::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 5px;
      background: linear-gradient(90deg, #ff0000, #ff3b3b, #ff0000);
    }

    .simbolo {
      margin-bottom: 8px;
      color: #ff2222;
      font-size: 54px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -8px;
      transform: skewX(-12deg);
    }

    .marca {
      margin: 0;
      color: #ffffff;
      font-size: 29px;
      font-style: italic;
      font-weight: 900;
      letter-spacing: 0.5px;
    }

    .sistema {
      margin-top: 7px;
      color: #c9c9c9;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .moto {
      margin-top: 20px;
      font-size: 66px;
      filter: drop-shadow(0 8px 12px rgba(255, 0, 0, 0.22));
    }

    .contenido {
      padding: 30px 22px 24px;
      background: #ffffff;
      color: #151515;
      text-align: center;
    }

    .titulo {
      margin: 0 0 10px;
      font-size: 25px;
      line-height: 1.3;
      font-weight: 800;
    }

    .titulo span {
      color: #ed1c24;
    }

    .descripcion {
      margin: 0 auto 26px;
      max-width: 350px;
      color: #6b6b6b;
      font-size: 15px;
      line-height: 1.5;
    }

    .estrellas {
      display: flex;
      justify-content: center;
      gap: 3px;
      margin: 8px 0 12px;
    }

    .estrella {
      border: none;
      padding: 2px;
      background: transparent;
      color: #d4d4d4;
      font-size: 50px;
      line-height: 1;
      cursor: pointer;
      transition:
        transform 0.16s ease,
        color 0.16s ease,
        filter 0.16s ease;
    }

    .estrella:hover {
      transform: translateY(-2px);
    }

    .estrella:active {
      transform: scale(0.88);
    }

    .estrella.activa {
      color: #ed1c24;
      filter: drop-shadow(0 3px 5px rgba(237, 28, 36, 0.28));
      animation: rebote 0.22s ease;
    }

    @keyframes rebote {
      0% {
        transform: scale(0.85);
      }

      70% {
        transform: scale(1.14);
      }

      100% {
        transform: scale(1);
      }
    }

    .resultado {
      min-height: 45px;
      margin-top: 12px;
      color: #151515;
      font-size: 17px;
      font-weight: 800;
    }

    .resultado span {
      display: block;
      margin-top: 4px;
      color: #ed1c24;
      font-size: 14px;
      font-weight: 700;
    }

    .escala {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
      color: #8a8a8a;
      font-size: 12px;
    }

    .progreso {
      margin-top: 28px;
    }

    .barra {
      width: 100%;
      height: 6px;
      overflow: hidden;
      border-radius: 999px;
      background: #ececec;
    }

    .avance {
      width: 20%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #c90000, #ff2d2d);
    }

    .texto-progreso {
      margin-top: 8px;
      color: #8a8a8a;
      font-size: 12px;
    }

    .pie {
      display: flex;
      justify-content: center;
      gap: 18px;
      padding: 16px 14px;
      background: #070707;
      color: #d6d6d6;
      font-size: 12px;
      text-align: center;
    }

    .pie-item {
      flex: 1;
      line-height: 1.45;
    }

    .pie-item strong {
      display: block;
      margin-bottom: 3px;
      color: #ffffff;
    }

    @media (max-width: 390px) {
      body {
        padding: 10px;
      }

      .tarjeta {
        border-radius: 22px;
      }

      .cabecera {
        padding: 24px 16px 20px;
      }

      .contenido {
        padding: 27px 15px 22px;
      }

      .marca {
        font-size: 25px;
      }

      .moto {
        font-size: 58px;
      }

      .estrella {
        font-size: 43px;
      }

      .titulo {
        font-size: 22px;
      }

      .pie {
        gap: 8px;
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <main class="tarjeta">
    <section class="cabecera">
      <div class="simbolo">≋</div>
      <h1 class="marca">ENVIEXPRESS</h1>
      <div class="sistema">Sistema de Calidad</div>
      <div class="moto" aria-label="Motorizado en moto lineal">🏍️</div>
    </section>

    <section class="contenido">
      <h2 class="titulo">
        ¿Cómo fue la <span>atención</span> de nuestro motorizado?
      </h2>

      <p class="descripcion">
        Tu opinión nos ayuda a mejorar la calidad de nuestras entregas.
      </p>

      <div class="estrellas" aria-label="Calificación de 1 a 5 estrellas">
        <button class="estrella" type="button" data-valor="1" aria-label="1 estrella">★</button>
        <button class="estrella" type="button" data-valor="2" aria-label="2 estrellas">★</button>
        <button class="estrella" type="button" data-valor="3" aria-label="3 estrellas">★</button>
        <button class="estrella" type="button" data-valor="4" aria-label="4 estrellas">★</button>
        <button class="estrella" type="button" data-valor="5" aria-label="5 estrellas">★</button>
      </div>

      <div id="resultado" class="resultado">
        Selecciona una calificación
      </div>

      <div class="escala">
        <span>Muy mala</span>
        <span>Excelente</span>
      </div>

      <div class="progreso">
        <div class="barra">
          <div class="avance"></div>
        </div>
        <div class="texto-progreso">Pregunta 1 de 5</div>
      </div>
    </section>

    <footer class="pie">
      <div class="pie-item">
        <strong>🔒 Confidencial</strong>
        Tus respuestas son privadas
      </div>

      <div class="pie-item">
        <strong>❤️ Tu opinión importa</strong>
        Nos ayuda a mejorar
      </div>
    </footer>
  </main>

  <script>
    const estrellas = document.querySelectorAll('.estrella');
    const resultado = document.getElementById('resultado');

    const mensajes = {
      1: {
        titulo: '😞 Lo sentimos',
        detalle: 'Queremos conocer qué ocurrió.'
      },
      2: {
        titulo: '😕 Podemos mejorar',
        detalle: 'Tu comentario será muy importante.'
      },
      3: {
        titulo: '😐 Atención regular',
        detalle: 'Gracias por ayudarnos a mejorar.'
      },
      4: {
        titulo: '😊 Buena atención',
        detalle: 'Nos alegra saberlo.'
      },
      5: {
        titulo: '😍 ¡Excelente!',
        detalle: 'Gracias por confiar en ENVIEXPRESS.'
      }
    };

    estrellas.forEach(estrella => {
      estrella.addEventListener('click', () => {
        const valor = Number(estrella.dataset.valor);

        estrellas.forEach(item => {
          const valorItem = Number(item.dataset.valor);

          item.classList.remove('activa');

          if (valorItem <= valor) {
            void item.offsetWidth;
            item.classList.add('activa');
          }
        });

        resultado.innerHTML = `
          ${mensajes[valor].titulo}
          <span>${mensajes[valor].detalle}</span>
        `;
      });
    });
  </script>
</body>
</html>
